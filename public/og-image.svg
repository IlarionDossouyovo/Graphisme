<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="150" r="60" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
  <circle cx="1000" cy="480" r="120" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
  
  <!-- Logo -->
  <g transform="translate(540, 250)">
    <circle cx="60" cy="60" r="50" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <circle cx="60" cy="60" r="38" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>
    <path d="M40 80 L60 35 L80 80 M60 35 L60 65" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="48" fill="#FFD700" text-anchor="middle" font-weight="bold">Graphisme by ELECTRON</text>
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="24" fill="#888" text-anchor="middle">Là où la créativité rencontre la technologie</text>
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="18" fill="#666" text-anchor="middle">Agence Digitale IA au Benin</text>
  
  <!-- AI Badge -->
  <rect x="500" y="520" width="200" height="40" rx="20" fill="url(#gold)" opacity="0.2"/>
  <text x="600" y="545" font-family="Arial, sans-serif" font-size="16" fill="#FFD700" text-anchor="middle">12 Agents IA</text>
</svg>
