version: '3.8'

services:
  # Application Next.js
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=http://localhost:3002
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-mkXA6svwThjuMCbXT4c7s+lvaPZyEIWbTdw3LlvK6Oo=}
      - OLLAMA_API_URL=http://ollama:11434
    volumes:
      - ./src/lib/db/data:/app/src/lib/db/data
      - ./public:/app/public
    restart: unless-stopped
    depends_on:
      - ollama

  # Ollama - Service IA Local
  ollama:
    image: ollama/ollama:latest
    container_name: graphisme-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0

  # Redis - Cache
  redis:
    image: redis:7-alpine
    container_name: graphisme-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Traefik - Reverse Proxy
  traefik:
    image: traefik:v3.0
    container_name: graphisme-traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/certs:/certs:ro
      - traefik-logs:/logs
    restart: unless-stopped
    environment:
      - TZ=Africa/Cotonou

volumes:
  ollama-data:
  redis-data:
  traefik-logs:

networks:
  default:
    name: graphisme-network
