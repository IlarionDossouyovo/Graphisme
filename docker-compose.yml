version: '3.8'

services:
  # Frontend Next.js Application
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - egraphisme-network

networks:
  egraphisme-network:
    driver: bridge

volumes:
